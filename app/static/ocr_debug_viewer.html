<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Debug Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-label {
            font-weight: 600;
            color: #495057;
        }

        .info-value {
            color: #2c3e50;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .steps-container {
            padding: 30px;
        }

        .step {
            margin-bottom: 40px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .step:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .step-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .step-title {
            font-size: 1.3em;
            font-weight: 600;
        }

        .step-number {
            background: rgba(255, 255, 255, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .step-content {
            padding: 25px;
            background: white;
        }

        .step-description {
            color: #6c757d;
            margin-bottom: 20px;
            font-size: 1.05em;
        }

        .step-image {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .metadata {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .metadata-title {
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .metadata-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .metadata-key {
            color: #6c757d;
            font-weight: 500;
        }

        .metadata-value {
            color: #2c3e50;
            font-weight: 600;
        }

        .ocr-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .ocr-result-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }

        .ocr-engine {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .ocr-text {
            font-family: 'Courier New', monospace;
            font-size: 1.3em;
            color: #2c3e50;
            padding: 10px;
            background: white;
            border-radius: 5px;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .ocr-confidence {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .confidence-bar {
            flex: 1;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            transition: width 0.5s;
        }

        .ensemble-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-left-color: #28a745;
        }

        .ensemble-card .ocr-text {
            font-size: 1.8em;
            color: #155724;
            text-align: center;
            letter-spacing: 3px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
            font-size: 1.5em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            border: 1px solid #f5c6cb;
        }

        .upload-form {
            padding: 40px;
            text-align: center;
        }

        .upload-form input[type="file"] {
            display: none;
        }

        .upload-label {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .upload-label:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .form-options {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .form-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-option select,
        .form-option input[type="checkbox"] {
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            font-size: 1em;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .info-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .step-header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 OCR Debug Visualization</h1>
            <p>Detailed step-by-step visualization of the Egyptian ID OCR pipeline</p>
        </div>

        <!-- Upload Form -->
        <div id="uploadForm" class="upload-form">
            <label for="fileInput" class="upload-label">
                📷 Choose ID Card Image
            </label>
            <input type="file" id="fileInput" accept="image/*">

            <div class="form-options">
                <div class="form-option">
                    <label for="fieldSelect">Field to Visualize:</label>
                    <select id="fieldSelect">
                        <option value="nid">National ID (NID)</option>
                        <option value="firstName">First Name</option>
                        <option value="lastName">Last Name</option>
                        <option value="address">Address</option>
                        <option value="serial">Serial Number</option>
                    </select>
                </div>
                <div class="form-option">
                    <label for="saveImages">Save Images:</label>
                    <input type="checkbox" id="saveImages">
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">
            ⏳ Processing OCR steps... Please wait...
        </div>

        <!-- Error -->
        <div id="error" class="error hidden"></div>

        <!-- Results -->
        <div id="results" class="hidden">
            <div class="info-bar">
                <div class="info-item">
                    <span class="info-label">📋 Field:</span>
                    <span class="info-value" id="fieldName">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📊 Steps:</span>
                    <span class="info-value" id="totalSteps">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">⏱️ Processing Time:</span>
                    <span class="info-value" id="processingTime">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">🎯 Fields Detected:</span>
                    <span class="info-value" id="fieldsDetected">-</span>
                </div>
            </div>

            <div class="steps-container" id="stepsContainer"></div>

            <div class="steps-container">
                <h2 style="margin-bottom: 20px; color: #2c3e50;">📊 OCR Results Summary</h2>
                <div id="ocrResultsContainer" class="ocr-results"></div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fieldSelect = document.getElementById('fieldSelect');
        const saveImages = document.getElementById('saveImages');
        const uploadForm = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Show loading
            uploadForm.classList.add('hidden');
            loading.classList.remove('hidden');
            error.classList.add('hidden');
            results.classList.add('hidden');

            // Prepare form data
            const formData = new FormData();
            formData.append('file', file);
            formData.append('field_name', fieldSelect.value);
            formData.append('save_images', saveImages.checked);

            try {
                const response = await fetch('/api/v1/debug/ocr-steps', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || 'Failed to process image');
                }

                const data = await response.json();
                displayResults(data);

            } catch (err) {
                error.textContent = `❌ Error: ${err.message}`;
                error.classList.remove('hidden');
                uploadForm.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        });

        function displayResults(data) {
            // Update info bar
            document.getElementById('fieldName').textContent = data.field_name;
            document.getElementById('totalSteps').textContent = data.total_steps;
            document.getElementById('processingTime').textContent = `${data.processing_time_ms} ms`;
            document.getElementById('fieldsDetected').textContent = data.debug_info?.fields_detected || 0;

            // Display steps
            const stepsContainer = document.getElementById('stepsContainer');
            stepsContainer.innerHTML = '';

            data.steps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step';
                stepDiv.innerHTML = `
                    <div class="step-header">
                        <span class="step-title">${step.name}</span>
                        <span class="step-number">Step ${index + 1}</span>
                    </div>
                    <div class="step-content">
                        <p class="step-description">${step.description}</p>
                        <img class="step-image" src="data:image/jpeg;base64,${step.image_base64}" alt="${step.name}">
                        ${Object.keys(step.metadata).length > 0 ? `
                            <div class="metadata">
                                <div class="metadata-title">Metadata</div>
                                <div class="metadata-grid">
                                    ${Object.entries(step.metadata).map(([key, value]) => `
                                        <div class="metadata-item">
                                            <span class="metadata-key">${key}:</span>
                                            <span class="metadata-value">${formatValue(value)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
                stepsContainer.appendChild(stepDiv);
            });

            // Display OCR results
            const ocrResultsContainer = document.getElementById('ocrResultsContainer');
            ocrResultsContainer.innerHTML = '';

            if (data.ocr_results) {
                Object.entries(data.ocr_results).forEach(([engine, result]) => {
                    const isEnsemble = engine === 'ensemble';
                    const cardDiv = document.createElement('div');
                    cardDiv.className = `ocr-result-card ${isEnsemble ? 'ensemble-card' : ''}`;
                    cardDiv.innerHTML = `
                        <div class="ocr-engine">${isEnsemble ? '🗳️ Ensemble Vote' : '🔤 ' + result.engine}</div>
                        <div class="ocr-text">${result.text || 'N/A'}</div>
                        <div class="ocr-confidence">
                            <span>Confidence:</span>
                            <div class="confidence-bar">
                                <div class="confidence-fill" style="width: ${(result.confidence || 0) * 100}%"></div>
                            </div>
                            <span>${((result.confidence || 0) * 100).toFixed(1)}%</span>
                        </div>
                    `;
                    ocrResultsContainer.appendChild(cardDiv);
                });
            }

            results.classList.remove('hidden');
        }

        function formatValue(value) {
            if (typeof value === 'boolean') {
                return value ? '✅ Yes' : '❌ No';
            }
            if (Array.isArray(value)) {
                return value.join(', ');
            }
            if (typeof value === 'object' && value !== null) {
                return JSON.stringify(value);
            }
            return String(value);
        }
    </script>
</body>
</html>
